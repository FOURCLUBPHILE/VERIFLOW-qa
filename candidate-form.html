<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Application Form</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Dedicated Styling for the Candidate Form -->
    <style>
        body {
            background-color: #f8fafc; /* Slightly lighter than login */
            background-image: linear-gradient( 109.6deg,  rgba(112,246,255,0.33) 11.2%, rgba(221,108,241,0.26) 42%, rgba(229,106,253,0.71) 71.5%, rgba(123,183,253,1) 100.2% );
        }







        /* 1. Main Card Styling */
        #login-container {
            max-width: 700px; /* Wider card */
            padding:0; /* Remove padding so we can use inner sections */
            overflow: hidden;
            border: none;
            box-shadow: 0 10px 25px -5px rgba(255, 59, 59, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* 2. Header Banner */
        .form-banner {
            background-image: linear-gradient( 109.6deg,  rgba(228,107,232,1) 11.2%, rgba(87,27,226,1) 96.7% );
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
        }

        .form-banner h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: white;
        }

        .form-banner p {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        /* 3. Form Body Area */
        .form-body {
            padding: 2.5rem 2.5rem 2rem 2.5rem;
            background-color: white;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        /* 4. Modern Inputs with Icons */
        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none; /* Allows clicking through the icon */
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.5rem; /* Left padding for icon */
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        input:focus {
            background-color: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        /* 5. Two Column Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        /* 6. File Upload Styling (The "Drop Zone" look) */
        .file-upload-wrapper {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        .file-upload-wrapper:hover {
            border-color: var(--accent-color);
            background-color: #eff6ff;
        }

        input[type="file"] {
            display: none; /* Hide the ugly default button */
        }

        .file-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
        }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        /* 7. Button Styling */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        /* 8. Footer Link */
        .form-footer-new {
            padding: 1.5rem;
            text-align: center;
            background-color: #f8fafc;
            border-top: 1px solid var(--border-color);
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        /* Responsive: Stack grid on mobile */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .form-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <main id="login-container">
        
        <!-- Header Banner -->
        <div class="form-banner">
            <h1>Join Our Team</h1>
            <p>Fill out the application form below</p>
        </div>

        <!-- Form Body -->
        <div class="form-body">
            <form id="candidate-form" novalidate>
                
                <!-- Full Name -->
                <div class="form-group">
                    <label for="candidate-name">Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="candidate-name" name="fullname" placeholder="e.g. Chris Lewis" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="candidate-email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="candidate-email" name="email" placeholder="chris@example.com" required>
                    </div>
                </div>

                <!-- Two Column Grid -->
                <div class="form-grid">
                    <!-- Phone -->
                    <div class="form-group">
                        <label for="candidate-phone">Phone Number</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📱</span>
                            <input type="tel" id="candidate-phone" name="phone" placeholder="+91 " required>
                        </div>
                    </div>

                    <!-- ID Number -->
                    <div class="form-group">
                        <label for="candidate-id">ID Number</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🆔</span>
                            <input type="text" id="candidate-id" name="idnumber" placeholder="ID-123456" required>
                        </div>
                    </div>
                </div>

                <!-- Previous Company -->
                <div class="form-group">
                    <label for="candidate-company">Previous Company</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🏢</span>
                        <input type="text" id="candidate-company" name="prevcompany" placeholder="e.g. Tech Corp">
                    </div>
                </div>

                <!-- Resume Upload -->
                <div class="form-group">
                    <label>Upload Resume</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="candidate-resume" name="resume" accept=".pdf,.doc,.docx">
                        <label for="candidate-resume" class="file-upload-label">
                            <span class="upload-icon">📄</span>
                            <span id="file-name-display" style="font-weight: 500;">Click to upload or drag file here</span>
                            <span style="font-size: 0.8rem; margin-top: 5px;">PDF, DOC up to 5MB</span>
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-application-btn" class="submit-btn">
                    Submit Application
                </button>

            </form>
        </div>

        <!-- Footer -->
        <div class="form-footer-new">
            <a href="index.html" class="back-link">← Back to Login</a>
        </div>

    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
        

            
        // 1. Handle File Selection Text Update (Visual Only)
        const fileInput = document.getElementById('candidate-resume');
        const fileNameDisplay = document.getElementById('file-name-display');

        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                fileNameDisplay.textContent = this.files[0].name;
                fileNameDisplay.style.color = "#e0aaff";
            }
        });

               // 2. Handle Form Submission
        document.getElementById('candidate-form').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById('submit-application-btn');
            
            // A. GRAB DATA
            const formData = {
                name: document.getElementById('candidate-name').value,
                email: document.getElementById('candidate-email').value,
                phone: document.getElementById('candidate-phone').value,
                idNumber: document.getElementById('candidate-id').value,
                company: document.getElementById('candidate-company').value,
                role: "Candidate",
                status: "Pending", 
                appliedDate: new Date().toLocaleDateString()
            };

            // B. SEND TO SERVER (POST)
            btn.textContent = "Sending...";
            btn.disabled = true;

            fetch('http://localhost:3000/candidates', {
                method: 'POST', // We are ADDING new data
                headers: {
                    'Content-Type': 'application/json' // Telling server: "I'm sending JSON"
                },
                body: JSON.stringify(formData) // Turning object into text for travel
            })
            .then(response => response.json()) // Wait for waiter to come back
            .then(data => {
                console.log('Success:', data);
                alert("Application Sent to Server!");
                window.location.href = "index.html"; 
            })
            .catch((error) => {
                console.error('Error:', error);
                alert("Failed to send data. Is JSON Server running?");
                btn.textContent = "Submit Application";
                btn.disabled = false;
            });
        });
       
    </script>
    </script>
</body>
</html>
